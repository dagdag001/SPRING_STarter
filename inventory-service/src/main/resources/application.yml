server:
  port: 8084

spring:
  application:
    name: inventory-service
  
  datasource:
    url: jdbc:h2:mem:inventorydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

rabbitmq:
  exchange:
    name: app.exchange
  queue:
    order-created: inventory.order.created.queue
  routing-key:
    order-created: order.created
    stock-reserved: stock.reserved
    stock-failed: stock.failed

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.inventoryservice: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG

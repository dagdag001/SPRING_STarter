server:
  port: 8081

spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

rabbitmq:
  exchange:
    name: app.exchange
  queue:
    user-registered: auth.user.registered.queue
  routing-key:
    user-registered: user.registered

jwt:
  secret: my-secret-key-that-is-at-least-256-bits-long-for-security
  expiration-hours: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.authservice: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG

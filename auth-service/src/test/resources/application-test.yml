server:
  port: 0

spring:
  application:
    name: auth-service-test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

jwt:
  secret: test-secret-key-for-testing-purposes-only-minimum-256-bits
  expiration-hours: 1

logging:
  level:
    com.example.authservice: INFO
    org.springframework: WARN

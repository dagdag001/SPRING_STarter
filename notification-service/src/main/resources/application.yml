server:
  port: 8086

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:h2:mem:notificationdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

rabbitmq:
  exchange:
    name: app.exchange
  queue:
    all-events: notification.all.events.queue
  routing-key:
    all-events: "#"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.notificationservice: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG

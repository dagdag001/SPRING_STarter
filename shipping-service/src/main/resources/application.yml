server:
  port: 8085

spring:
  application:
    name: shipping-service
  
  datasource:
    url: jdbc:h2:mem:shippingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

rabbitmq:
  exchange:
    name: app.exchange
  queue:
    payment-completed: shipping.payment.completed.queue
    stock-reserved: shipping.stock.reserved.queue
  routing-key:
    payment-completed: payment.completed
    stock-reserved: stock.reserved
    shipment-created: shipment.created

shipment:
  delivery-days: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.shippingservice: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG
